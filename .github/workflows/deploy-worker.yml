name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - src/**
      - scripts/sync-data.mjs
      - web/**
      - wrangler.toml
      - package.json
      - package-lock.json
      - items_data.json
      - hero_details.json
      - hero_by_slug/**
      - data/**

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync data assets
        run: npm run sync:data

      - name: Validate Cloudflare secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing required GitHub Actions secrets."
            echo "Please set CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN in repo settings."
            exit 1
          fi

      - name: Verify Cloudflare token validity
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          HTTP_CODE=$(curl -sS -o cf_token_verify.json -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Cloudflare token verify failed with HTTP $HTTP_CODE"
            cat cf_token_verify.json
            exit 1
          fi

          if ! grep -q '"success":true' cf_token_verify.json; then
            echo "Cloudflare token is invalid/revoked or malformed."
            cat cf_token_verify.json
            exit 1
          fi

      - name: Verify token can access target account
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          HTTP_CODE=$(curl -sS -o cf_account_verify.json -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Token cannot access target account. HTTP $HTTP_CODE"
            cat cf_account_verify.json
            exit 1
          fi

          if ! grep -q '"success":true' cf_account_verify.json; then
            echo "Token/account mismatch or missing account permissions."
            cat cf_account_verify.json
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
