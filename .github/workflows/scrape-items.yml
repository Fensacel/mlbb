name: Scrape Items Data

on:
  workflow_dispatch:
  schedule:
    - cron: "5,35 * * * *"

permissions:
  contents: write

concurrency:
  group: scrape-items
  cancel-in-progress: false

jobs:
  scrape-items:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Scrape items data
        run: |
          if [ ! -f items_v2.json ]; then
            echo "items_v2.json not found, skipping item scrape."
            exit 0
          fi

          python scraper.py --input items_v2.json --output items_data.json

      - name: Commit and push item changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ ! -f items_data.json ]; then
            echo "items_data.json not generated. Skip commit."
            exit 0
          fi

          git add -- items_data.json

          if git diff --cached --quiet; then
            echo "No item changes to commit"
            exit 0
          fi

          git commit -m "chore(data): update items_data.json"
          git pull --rebase origin ${GITHUB_REF_NAME}
          git push
